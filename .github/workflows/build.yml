name: HnS Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          apt-get update
          apt-get install -y build-essential libpng-dev git wget python3
          git clone --depth=1 https://github.com/pret/agbcc
          cd agbcc && ./build.sh && ./install.sh ../ && cd ..

      - name: Prepare Build
        run: |
          # Creates a blank file so the Makefile doesn't complain about a missing rom
          touch baserom.gba
          # Build the tools first
          make -C tools -j$(nproc)
          
      - name: Build ROM
        run: |
          # This runs the actual compiler
          make -j$(nproc)
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Pokemon-HnS-ROM
          path: "*.gba"
